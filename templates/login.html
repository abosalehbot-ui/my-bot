<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SalehZon Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-gamepad text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">SalehZon</h1>
            <p class="text-gray-500 mt-2 text-sm">Sign in to admin dashboard</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm flex items-center" role="alert">
            <i class="fas fa-exclamation-circle mr-2 text-lg"></i>
            <span class="block sm:inline font-medium">{{ error }}</span>
        </div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input class="pl-10 appearance-none border border-gray-200 rounded-lg w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="username" name="username" type="text" required placeholder="Enter username">
                </div>
            </div>
            <div class="mb-8">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input class="pl-10 appearance-none border border-gray-200 rounded-lg w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="password" name="password" type="password" required placeholder="••••••••">
                </div>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg w-full focus:outline-none focus:ring-4 focus:ring-blue-300 transition duration-200 shadow-md flex items-center justify-center" type="submit">
                <span>Sign In</span>
                <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>
    </div>
</body>
</html>
