<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalehZon - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { szgreen: '#7dfc89', szcyan: '#5eead4', darkbg: '#0a0a0a', cardbg: '#141414' } } }
        }
    </script>
</head>
<body class="bg-darkbg text-gray-200 flex items-center justify-center h-screen font-sans selection:bg-szgreen selection:text-black relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-szgreen rounded-full opacity-10 blur-[100px] pointer-events-none"></div>

    <div class="bg-cardbg p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-800 relative z-10 backdrop-blur-sm">
        <div class="text-center mb-10">
            <img src="/static/logo.png" alt="9S Logo" class="h-20 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(125,252,137,0.5)]" onerror="this.src='https://via.placeholder.com/80/0a0a0a/7dfc89?text=9S'">
            <h1 class="text-3xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-szgreen to-szcyan">Saleh Zone</h1>
            <p class="text-gray-500 mt-2 text-xs uppercase tracking-widest">System Authentication</p>
        </div>
        
        {% if error %}
        <div class="bg-red-900/30 border border-red-800 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm flex items-center shadow-[0_0_10px_rgba(220,38,38,0.2)]">
            <i class="fas fa-engine-warning mr-2"></i> {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="mb-5 relative">
                <i class="fas fa-user absolute top-3.5 left-4 text-gray-500"></i>
                <input class="w-full bg-[#0a0a0a] border border-gray-800 rounded-lg py-3 pl-10 pr-4 text-gray-200 focus:outline-none focus:border-szgreen focus:ring-1 focus:ring-szgreen transition-all placeholder-gray-600" id="username" name="username" type="text" required placeholder="Admin ID">
            </div>
            <div class="mb-8 relative">
                <i class="fas fa-lock absolute top-3.5 left-4 text-gray-500"></i>
                <input class="w-full bg-[#0a0a0a] border border-gray-800 rounded-lg py-3 pl-10 pr-4 text-gray-200 focus:outline-none focus:border-szcyan focus:ring-1 focus:ring-szcyan transition-all placeholder-gray-600" id="password" name="password" type="password" required placeholder="••••••••">
            </div>
            <button class="w-full bg-gradient-to-r from-szgreen to-szcyan text-black font-bold py-3 px-4 rounded-lg hover:opacity-90 transition-all duration-300 shadow-[0_0_20px_rgba(125,252,137,0.3)] hover:shadow-[0_0_30px_rgba(94,234,212,0.5)] transform hover:-translate-y-0.5" type="submit">
                ACCESS SYSTEM <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
