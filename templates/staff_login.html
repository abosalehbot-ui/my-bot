<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleh Zone | Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-white">
    <div class="relative min-h-screen overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,#0f3d2a_0%,rgba(5,5,5,0.95)_45%,#050505_100%)]"></div>
        <div class="absolute -top-24 left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-emerald-400/10 blur-3xl"></div>
        <div class="relative flex min-h-screen items-center justify-center px-4 py-10">
            <div class="w-full max-w-md rounded-3xl border border-white/10 bg-black/55 p-8 shadow-[0_30px_120px_rgba(0,0,0,0.45)] backdrop-blur-xl">
                <div class="mb-8 text-center">
                    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl border border-emerald-400/25 bg-emerald-400/10 text-2xl font-black text-emerald-300">SZ</div>
                    <p class="text-xs font-black uppercase tracking-[0.35em] text-emerald-300/80">Store Staff Portal</p>
                    <h1 class="mt-3 text-3xl font-black tracking-tight text-white">Staff Login</h1>
                    <p class="mt-2 text-sm text-gray-400">Employee and admin accounts sign in here to access `/store-admin`.</p>
                </div>

                <form id="staff-login-form" class="space-y-4">
                    <div>
                        <label for="staff-email" class="mb-2 block text-xs font-bold uppercase tracking-[0.25em] text-gray-400">Email</label>
                        <input id="staff-email" name="email" type="email" required class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-emerald-400/50 focus:bg-white/10" placeholder="team@salehzone.com">
                    </div>
                    <div>
                        <label for="staff-password" class="mb-2 block text-xs font-bold uppercase tracking-[0.25em] text-gray-400">Password</label>
                        <input id="staff-password" name="password" type="password" required class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-emerald-400/50 focus:bg-white/10" placeholder="Enter your staff password">
                    </div>
                    <div id="staff-login-status" class="min-h-[1.25rem] text-sm font-bold text-center text-gray-400"></div>
                    <button id="staff-login-submit" type="submit" class="w-full rounded-2xl bg-gradient-to-r from-emerald-300 via-teal-300 to-cyan-300 px-4 py-3 text-sm font-black uppercase tracking-[0.2em] text-black transition hover:opacity-90">Enter Store Admin</button>
                </form>

                <div class="mt-6 rounded-2xl border border-white/10 bg-white/5 p-4 text-xs text-gray-400">
                    <p class="font-bold text-white">Access policy</p>
                    <p class="mt-1">Only `employee` and `admin` roles from `store_customers` are allowed through this portal.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('staff-login-form');
        const submitBtn = document.getElementById('staff-login-submit');
        const statusEl = document.getElementById('staff-login-status');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            statusEl.textContent = 'Signing in...';
            statusEl.className = 'min-h-[1.25rem] text-sm font-bold text-center text-emerald-300';
            submitBtn.disabled = true;

            const payload = new FormData(form);
            try {
                const response = await fetch('/api/store/staff-login', {
                    method: 'POST',
                    body: payload,
                    credentials: 'same-origin',
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    statusEl.textContent = data.msg || 'Unable to sign in.';
                    statusEl.className = 'min-h-[1.25rem] text-sm font-bold text-center text-red-400';
                    return;
                }
                window.location.href = data.redirect_url || '/store-admin';
            } catch (error) {
                statusEl.textContent = 'Connection error. Please try again.';
                statusEl.className = 'min-h-[1.25rem] text-sm font-bold text-center text-red-400';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
