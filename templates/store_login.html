<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Saleh Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{szgreen:'#7dfc89',szcyan:'#5eead4',darkbg:'#050505',panelbg:'#111'}}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #d1d5db; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #050505; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; transition: 0.3s; } ::-webkit-scrollbar-thumb:hover { background: #7dfc89; box-shadow: 0 0 10px #7dfc89; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } } .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } } .floating { animation: float 3s ease-in-out infinite; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(125,252,137,0.2); } 50% { box-shadow: 0 0 20px rgba(125,252,137,0.5); transform: scale(1.02); } 100% { box-shadow: 0 0 10px rgba(125,252,137,0.2); } } .btn-glow { transition: all 0.3s ease; } .btn-glow:hover { animation: pulseGlow 1.5s infinite; border-color: #7dfc89; }
        @keyframes gradientX { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } } .text-gradient-animate { background-size: 200% 200%; animation: gradientX 3s ease infinite; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-darkbg relative overflow-hidden selection:bg-szgreen selection:text-black">

    <div class="absolute -top-40 -right-40 w-96 h-96 bg-szgreen/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-szcyan/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-[360px] p-8 bg-panelbg/80 backdrop-blur-xl border border-gray-800 rounded-2xl shadow-2xl relative z-10 m-4 fade-in">
        
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black text-white tracking-widest text-gradient-animate mb-1">SALEH <span class="text-transparent bg-clip-text bg-gradient-to-r from-szgreen to-szcyan">ZONE</span></h2>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Account Login</p>
        </div>

        <form class="mt-6" onsubmit="event.preventDefault(); alert('Manual login is disabled for security. Please use Google or Telegram below.');">
            <div class="mt-1 text-sm">
                <label for="username" class="block text-gray-400 mb-1 font-bold">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" class="w-full rounded-md border border-gray-700 bg-[#0a0a0a] px-4 py-3 text-gray-200 outline-none focus:border-szgreen focus:ring-1 focus:ring-szgreen transition-all">
            </div>
            
            <div class="mt-4 text-sm">
                <label for="password" class="block text-gray-400 mb-1 font-bold">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" class="w-full rounded-md border border-gray-700 bg-[#0a0a0a] px-4 py-3 text-gray-200 outline-none focus:border-szcyan focus:ring-1 focus:ring-szcyan transition-all">
                <div class="flex justify-end text-xs text-gray-400 mt-2 mb-4">
                    <a href="#" class="hover:text-szcyan transition hover:underline">Forgot Password?</a>
                </div>
            </div>

            <button class="block w-full bg-gradient-to-r from-szgreen to-szcyan py-3 text-center text-black border-none rounded-md font-black text-sm uppercase tracking-wide btn-glow">Sign in</button>
        </form>

        <div class="flex items-center pt-6 pb-4">
            <div class="flex-1 h-px bg-gray-800"></div>
            <p class="px-3 text-xs text-gray-500 uppercase tracking-wider">Or continue with</p>
            <div class="flex-1 h-px bg-gray-800"></div>
        </div>

        <div class="flex flex-col gap-3 justify-center items-center">
            
            <div id="g_id_onload" data-client_id="{{ client_id }}" data-context="signin" data-ux_mode="popup" data-callback="handleGoogleResponse" data-auto_prompt="false"></div>
            <div class="relative group w-full flex justify-center">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-szgreen to-szcyan rounded-md blur opacity-20 group-hover:opacity-50 transition duration-500"></div>
                <div class="relative bg-black border border-gray-800 rounded-md p-1 w-full flex justify-center">
                    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="continue_with" data-size="large" data-logo_alignment="center"></div>
                </div>
            </div>

            <div class="relative group w-full flex justify-center mt-1">
                <div class="absolute -inset-0.5 bg-[#2AABEE] rounded-md blur opacity-20 group-hover:opacity-60 transition duration-500"></div>
                <div class="relative bg-[#2AABEE]/10 border border-[#2AABEE]/30 rounded-md py-1.5 w-full flex justify-center items-center h-[46px]">
                    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="salehmailbot" data-size="large" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
                </div>
            </div>

        </div>

        <div id="login-status" class="text-xs font-bold text-center text-szcyan mt-4 h-4"></div>

        <p class="text-center text-xs text-gray-500 mt-6 border-t border-gray-800 pt-5">
            Don't have an account? <a href="#" class="text-gray-200 hover:text-szgreen hover:underline font-bold transition">Sign up</a>
        </p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem('store_email')) { window.location.href = '/'; }
        });

        function saveAndRedirect(data) {
            localStorage.setItem('store_email', data.email);
            localStorage.setItem('store_name', data.name);
            localStorage.setItem('store_balance', data.balance);
            window.location.href = '/';
        }

        // معالجة تسجيل جوجل
        async function handleGoogleResponse(response) {
            const statusDiv = document.getElementById('login-status');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying Google account...';
            const fd = new FormData(); fd.append('credential', response.credential);
            try {
                const res = await fetch('/api/store/google-login', {method: 'POST', body: fd});
                const data = await res.json();
                if(data.success) { saveAndRedirect(data); } else { statusDiv.innerHTML = `<span class="text-red-500">${data.msg}</span>`; }
            } catch(err) { statusDiv.innerHTML = '<span class="text-red-500">Connection error.</span>'; }
        }

        // معالجة تسجيل تليجرام
        async function onTelegramAuth(user) {
            const statusDiv = document.getElementById('login-status');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying Telegram account...';
            
            const fd = new FormData();
            fd.append('tg_id', user.id);
            fd.append('name', user.first_name + (user.last_name ? ' ' + user.last_name : ''));
            fd.append('username', user.username || '');

            try {
                const res = await fetch('/api/store/telegram-login', {method: 'POST', body: fd});
                const data = await res.json();
                if(data.success) { saveAndRedirect(data); } else { statusDiv.innerHTML = `<span class="text-red-500">${data.msg}</span>`; }
            } catch(err) { statusDiv.innerHTML = '<span class="text-red-500">Connection error.</span>'; }
        }
    </script>
</body>
</html>
