<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر صالح زون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{szgreen:'#7dfc89',szcyan:'#5eead4',darkbg:'#050505',panelbg:'#111'}}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #d1d5db; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-darkbg relative overflow-hidden selection:bg-szgreen selection:text-black">

    <div class="absolute -top-40 -right-40 w-96 h-96 bg-szgreen/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-szcyan/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md p-8 bg-panelbg/80 backdrop-blur-xl border border-gray-800 rounded-3xl shadow-2xl relative z-10 m-4">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-black rounded-full border border-gray-800 mb-4 shadow-[0_0_20px_rgba(125,252,137,0.15)]">
                <img src="/static/logo.png" alt="SZ" class="w-12 drop-shadow-[0_0_8px_rgba(125,252,137,0.5)]" onerror="this.style.display='none'">
            </div>
            <h2 class="text-3xl font-black text-white tracking-wide mb-1">صالح <span class="text-transparent bg-clip-text bg-gradient-to-r from-szgreen to-szcyan">زون</span></h2>
            <p class="text-gray-500 text-sm font-bold">بوابة شحن الزبائن</p>
        </div>

        <form id="loginForm" onsubmit="doLogin(event)">
            <div class="mb-6">
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wider">رقم الهاتف (معرف الحساب)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <i class="fas fa-phone text-szcyan"></i>
                    </div>
                    <input type="tel" id="login-phone" placeholder="أدخل رقمك هنا..." required class="w-full bg-black border border-gray-800 text-white font-mono text-lg rounded-xl pr-12 pl-4 py-3 outline-none focus:border-szcyan focus:ring-1 focus:ring-szcyan transition" dir="ltr">
                </div>
            </div>

            <button type="submit" id="btn-login" class="w-full bg-gradient-to-r from-szgreen to-szcyan text-black font-black text-lg py-3 rounded-xl hover:opacity-90 transition shadow-[0_0_20px_rgba(125,252,137,0.2)] flex justify-center items-center gap-2 mt-4">
                <span>دخول للمتجر</span> <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-800 pt-6">
            <p class="text-xs text-gray-500">ليس لديك حساب؟ <br> <span class="text-szcyan font-bold mt-1 inline-block">تواصل مع الإدارة لشحن وتفعيل محفظتك</span></p>
        </div>
    </div>

    <script>
        // التحقق إذا كان مسجل دخول مسبقاً، يحوله للمتجر فوراً
        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem('store_phone')) {
                window.location.href = '/shop';
            }
        });

        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const phone = document.getElementById('login-phone').value;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            btn.disabled = true;

            const fd = new FormData(); 
            fd.append('phone', phone);
            
            try {
                const res = await fetch('/api/store/login', {method: 'POST', body: fd});
                const data = await res.json();
                
                if(data.success) {
                    // حفظ بيانات الزبون في المتصفح
                    localStorage.setItem('store_phone', data.phone);
                    localStorage.setItem('store_name', data.name);
                    localStorage.setItem('store_balance', data.balance);
                    
                    // تحويل مباشر لصفحة المتجر
                    window.location.href = '/shop';
                } else { 
                    alert(data.msg); 
                    btn.innerHTML = '<span>دخول للمتجر</span> <i class="fas fa-sign-in-alt"></i>';
                    btn.disabled = false;
                }
            } catch(err) { 
                alert("حدث خطأ في الاتصال. يرجى المحاولة لاحقاً."); 
                btn.innerHTML = '<span>دخول للمتجر</span> <i class="fas fa-sign-in-alt"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
