<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر صالح زون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{szgreen:'#7dfc89',szcyan:'#5eead4',darkbg:'#050505',panelbg:'#111'}}}}</script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap'); body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #d1d5db; }</style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-darkbg relative overflow-hidden selection:bg-szgreen selection:text-black">

    <div class="absolute -top-40 -right-40 w-96 h-96 bg-szgreen/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-szcyan/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md p-8 bg-panelbg/80 backdrop-blur-xl border border-gray-800 rounded-3xl shadow-2xl relative z-10 m-4 text-center">
        
        <div class="inline-flex items-center justify-center w-20 h-20 bg-black rounded-full border border-gray-800 mb-4 shadow-[0_0_20px_rgba(125,252,137,0.15)]">
            <img src="/static/logo.png" alt="SZ" class="w-12 drop-shadow-[0_0_8px_rgba(125,252,137,0.5)]" onerror="this.style.display='none'">
        </div>
        <h2 class="text-3xl font-black text-white tracking-wide mb-1">صالح <span class="text-transparent bg-clip-text bg-gradient-to-r from-szgreen to-szcyan">زون</span></h2>
        <p class="text-gray-400 text-sm font-bold mb-8">تسجيل الدخول الآمن للمتجر</p>

        <div id="g_id_onload"
             data-client_id="{{ client_id }}"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleResponse"
             data-auto_prompt="false">
        </div>

        <div class="flex justify-center mb-4">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
        
        <div id="login-status" class="text-sm font-bold text-szcyan mt-4 h-6"></div>

        <div class="mt-8 text-center border-t border-gray-800 pt-6">
            <p class="text-xs text-gray-500">سيتم إنشاء حساب لك تلقائياً إذا كانت هذه أول زيارة.</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // لو هو مسجل دخول، رجعه للصفحة الرئيسية (المتجر)
            if(localStorage.getItem('store_email')) { window.location.href = '/'; }
        });

        async function handleGoogleResponse(response) {
            const token = response.credential;
            const statusDiv = document.getElementById('login-status');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق من الحساب...';

            const fd = new FormData(); 
            fd.append('credential', token);
            
            try {
                const res = await fetch('/api/store/google-login', {method: 'POST', body: fd});
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('store_email', data.email);
                    localStorage.setItem('store_name', data.name);
                    localStorage.setItem('store_balance', data.balance);
                    // بعد نجاح التسجيل، يحوله للصفحة الرئيسية للمتجر
                    window.location.href = '/';
                } else { 
                    statusDiv.innerHTML = `<span class="text-red-500">${data.msg}</span>`;
                }
            } catch(err) { 
                statusDiv.innerHTML = '<span class="text-red-500">حدث خطأ في الاتصال.</span>';
            }
        }
    </script>
</body>
</html>
