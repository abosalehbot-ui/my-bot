name: CI

on:
  push:
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Python syntax
        run: |
          python -m py_compile web.py store_routes.py main.py handlers.py database.py config.py keyboards.py
      - name: Ruff
        run: ruff check .
      - name: MyPy
        run: mypy web.py store_routes.py
      - name: Pytest
        run: pytest
      - name: Bandit
        run: bandit -q -r . -x .git,tests,__pycache__
      - name: pip-audit
        run: pip-audit -r requirements.txt

  js-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install JS deps
        run: npm install
      - name: JS syntax
        run: node --check static/js/store.js && node --check static/js/core.js
      - name: ESLint
        run: npm run lint:js

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/python
            p/secrets

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
